//   - Groovy DSL  → build.gradle  (first block)
//   - Kotlin DSL  → build.gradle.kts (second block)
//
// For multi-module projects: add to root build file only.
// The plugin processes all subprojects automatically.
//
// WARNING: Gradle plugin uses `activeRecipe()` (singular), NOT `activeRecipes()`.
// Calling `activeRecipes()` will fail with "Unknown property" error.


/*
plugins {
    id("org.openrewrite.rewrite") version "latest.release"
    // Or pin specific version: id("org.openrewrite.rewrite") version "6.10.0"
}

rewrite {
    // Order matters: Java first, then framework recipes
    
    // ---- Option A1: Inline recipes (simple) ----
    activeRecipe("org.openrewrite.java.migrate.UpgradeToJava25")
    activeRecipe("org.openrewrite.java.spring.boot4.UpgradeSpringBoot_4_0")
    activeRecipe("org.openrewrite.java.spring.cloud2025.UpgradeSpringCloud_2025_1")
    activeRecipe("org.openrewrite.java.jackson.UpgradeJackson_3")
    activeRecipe("org.openrewrite.java.testing.junit5.JUnit4to5Migration")
    activeRecipe("org.openrewrite.java.testing.junit6.UpgradeToJUnit6")
    activeRecipe("org.openrewrite.maven.UpgradePlugins")
    activeRecipe("org.openrewrite.gradle.UpgradePlugins")
    
    // ---- Option A2: Umbrella recipe via rewrite.yml ----
    // activeRecipe("com.company.FullModernization")

    // Generate detailed reports in rewrite-datatables/
    setExportDatatables(true)
    
    // Optional: Enable debug logging
    // setLogLevel("DEBUG")
}

repositories {
    mavenCentral()
}

dependencies {
    // Java migration recipes
    rewrite("org.openrewrite.recipe:rewrite-migrate-java:latest.release")
    
    // Spring Boot 4.0 migration recipes
    rewrite("org.openrewrite.recipe:rewrite-spring:latest.release")
    
    // Jackson 3 migration recipes
    rewrite("org.openrewrite.recipe:rewrite-jackson:latest.release")
    
    // JUnit 6 / testing migration recipes
    rewrite("org.openrewrite.recipe:rewrite-testing-frameworks:latest.release")
}
